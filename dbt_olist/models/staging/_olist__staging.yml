version: 2

models:
  - name: olist__orders
    description: >
      Cabeçalho dos pedidos Olist. Grão = pedido. Timestamps deslocados +2556 dias
      em relação ao dataset original (SPEC 01B). Colunas renomeadas para nomes de
      negócio mais curtos (ex: purchased_at, approved_at).
    columns:
      - name: order_id
        description: Identificador único do pedido.
        tests: [unique, not_null]

      - name: customer_id
        description: >
          FK para olist__customers.customer_id. Identifica o cliente neste pedido
          (gerado por pedido; use customer_unique_id para agrupar o mesmo cliente).
        tests:
          - not_null
          - relationships:
              to: ref('olist__customers')
              field: customer_id

      - name: order_status
        description: >
          Status atual do pedido. Valores possíveis: delivered, shipped, canceled,
          invoiced, processing, approved, created, unavailable.
        tests: [not_null]

      - name: purchased_at
        description: Momento em que o cliente finalizou a compra (order_purchase_timestamp).
        tests: [not_null]

      - name: approved_at
        description: Momento em que o pagamento foi aprovado. Nulo para pedidos cancelados antes da aprovação.

      - name: carrier_delivered_at
        description: Momento em que o seller postou o pedido na transportadora. Nulo para pedidos não expedidos.

      - name: customer_delivered_at
        description: Momento em que o cliente recebeu o pedido. Nulo para pedidos não entregues.

      - name: estimated_delivery_at
        description: Data estimada de entrega comunicada ao cliente no momento da compra.
        tests: [not_null]

  - name: olist__order_items
    description: >
      Itens individuais dentro de cada pedido. Grão = item (order_id + order_item_id).
      Um pedido pode ter múltiplos itens de diferentes sellers.
    columns:
      - name: order_id
        description: FK para olist__orders.order_id. Identifica o pedido ao qual este item pertence.
        tests:
          - not_null
          - relationships:
              to: ref('olist__orders')
              field: order_id

      - name: order_item_id
        description: Sequencial do item dentro do pedido (1, 2, 3…). Compõe a PK junto com order_id.
        tests: [not_null]

      - name: product_id
        description: Identificador do produto vendido.
        tests: [not_null]

      - name: seller_id
        description: FK para olist__sellers.seller_id. Vendedor responsável por este item.
        tests:
          - not_null
          - relationships:
              to: ref('olist__sellers')
              field: seller_id

      - name: shipping_limit_at
        description: Prazo máximo para o seller postar o item na transportadora (shipping_limit_date).
        tests: [not_null]

      - name: price
        description: Preço unitário do produto (sem frete), em R$.
        tests: [not_null]

      - name: freight_value
        description: Valor do frete para este item, em R$.
        tests: [not_null]

  - name: olist__order_reviews
    description: >
      Avaliações de pedidos feitas pelos clientes. Grão = review.
      review_id NÃO é único no dataset raw (789 duplicatas conhecidas);
      a deduplicação ocorre no intermediate__pedidos_enriquecidos via ROW_NUMBER().
    columns:
      - name: review_id
        description: Identificador da review. Não único no dataset bruto (reviews reenviadas pelo cliente).
        tests: [not_null]

      - name: order_id
        description: FK para olist__orders.order_id. Pedido avaliado.
        tests:
          - not_null
          - relationships:
              to: ref('olist__orders')
              field: order_id

      - name: review_score
        description: Nota do cliente de 1 (péssimo) a 5 (excelente).
        tests: [not_null]

      - name: comment_title
        description: Título opcional do comentário da review. Nulo quando o cliente não preencheu.

      - name: comment_message
        description: Corpo opcional do comentário da review. Nulo quando o cliente não preencheu.

      - name: created_at
        description: Data em que a pesquisa de satisfação foi enviada ao cliente (review_creation_date).
        tests: [not_null]

      - name: answered_at
        description: Data em que o cliente respondeu à pesquisa (review_answer_timestamp).
        tests: [not_null]

  - name: olist__customers
    description: >
      Clientes do marketplace Olist. Grão = customer_id (chave de pedido).
      Um mesmo cliente físico pode ter múltiplos customer_id entre pedidos;
      customer_unique_id identifica o cliente real.
    columns:
      - name: customer_id
        description: >
          Identificador do cliente neste pedido (gerado por pedido, não por cliente real).
          Use customer_unique_id para análises entre pedidos do mesmo cliente.
        tests: [unique, not_null]

      - name: customer_unique_id
        description: Identificador único do cliente real, consistente entre pedidos distintos.
        tests: [not_null]

      - name: zip_code_prefix
        description: Prefixo do CEP do cliente (5 dígitos).
        tests: [not_null]

      - name: city
        description: Cidade do cliente, normalizada em minúsculas no dataset original.
        tests: [not_null]

      - name: state
        description: Sigla do estado (UF) do cliente, 2 caracteres.
        tests: [not_null]

  - name: olist__sellers
    description: >
      Vendedores cadastrados no marketplace Olist. 3.095 sellers únicos.
      Localização geográfica por CEP e UF.
    columns:
      - name: seller_id
        description: Identificador único do vendedor.
        tests: [unique, not_null]

      - name: zip_code_prefix
        description: Prefixo do CEP do seller (5 dígitos).
        tests: [not_null]

      - name: city
        description: Cidade do seller.
        tests: [not_null]

      - name: state
        description: Sigla do estado (UF) do seller, 2 caracteres.
        tests: [not_null]
