version: 2

sources:
  - name: olist
    schema: bronze
    tables:
      - name: olist__orders
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests: [not_null]

      - name: olist__order_items
        columns:
          - name: order_id
            tests: [not_null]
          - name: order_item_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: seller_id
            tests: [not_null]

      - name: olist__order_reviews
        columns:
          - name: review_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: review_score
            tests: [not_null]

      - name: olist__customers
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: customer_unique_id
            tests: [not_null]
          - name: customer_state
            tests: [not_null]

      - name: olist__sellers
        columns:
          - name: seller_id
            tests: [unique, not_null]
          - name: seller_state
            tests: [not_null]
